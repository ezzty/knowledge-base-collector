<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
    .settings-btn {
      background: none; border: none; color: #666; font-size: 20px;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
    }
    .settings-btn:hover { background: #333; color: #aaa; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 12px; color: #888;
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .field input {
      width: 100%; padding: 8px 10px; background: #16213e;
      border: 1px solid #333; border-radius: 6px;
      color: #e0e0e0; font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #4a9eff; }
    .page-info {
      background: #16213e; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 14px;
    }
    .page-info .title { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 4px; word-break: break-all; }
    .page-info .url { font-size: 11px; color: #666; word-break: break-all; }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: #4a9eff; color: #fff; }
    .btn-primary:hover { background: #3a8eef; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .status { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; display: none; }
    .status.success { display: block; background: #1a3a2a; color: #4ade80; border: 1px solid #2a5a3a; }
    .status.error { display: block; background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
    .status.loading { display: block; background: #1a2a3e; color: #60a5fa; border: 1px solid #2a3a5e; }
    .tags-hint { font-size: 11px; color: #555; margin-top: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="icon">
    <h1>Save to Knowledge Base</h1>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div class="page-info">
    <div class="title" id="pageTitle">Loading...</div>
    <div class="url" id="pageUrl"></div>
  </div>

  <div class="field">
    <label>Filename</label>
    <input type="text" id="filename" placeholder="Leave empty to auto-generate">
  </div>

  <div class="field">
    <label>Category (optional)</label>
    <input type="text" id="category" placeholder="e.g. tech, travel, finance...">
    <div class="tags-hint">Creates a subfolder, e.g. knowledge-base/tech/</div>
  </div>

  <button class="btn btn-primary" id="saveBtn">💾 Save to Knowledge Base</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
