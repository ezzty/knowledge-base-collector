services:
  kb-save-server:
    build:
      context: .
      args:
        UID: "1000"
        GID: "1000"
    container_name: kb-save-server
    restart: unless-stopped
    ports:
      - "8396:8396"
    environment:
      - KB_PORT=8396
      - KB_DIR=/data/knowledge-base
    volumes:
      - ./knowledge-base:/data/knowledge-base
      - ./data/config:/data/config
